name: Publish to npm

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          # If using npm Trusted Publishers (OIDC), no token is needed.
          # If not configured, create a Granular Access Token at npmjs.com
          # and store it as NPM_TOKEN in repository Settings > Secrets.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
